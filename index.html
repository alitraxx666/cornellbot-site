<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cornell Bot</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e2937);
  color: #e2e8f0;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 2rem;
}

h1 {
  text-align: center;
  color: #60a5fa;
}

.chat {
  background: #0f172a;
  border: 1px solid #334155;
  border-radius: 12px;
  height: 65vh;
  display: flex;
  flex-direction: column;
}

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 1rem;
  display: flex;
  flex-direction: column;
}

.message {
  margin-bottom: 10px;
  padding: 10px 14px;
  border-radius: 10px;
  max-width: 75%;
}

.user {
  background: #3b82f6;
  align-self: flex-end;
}

.bot {
  background: #1e2937;
}

.input-area {
  display: flex;
  padding: 10px;
  border-top: 1px solid #334155;
}

input {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: #334155;
  color: white;
}

button {
  margin-left: 10px;
  padding: 0 20px;
  border: none;
  border-radius: 8px;
  background: #60a5fa;
  cursor: pointer;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
  <h1>Cornell Bot</h1>

  <div class="chat">
    <div class="messages" id="messages">
      <div class="message bot">Hello. I am Cornell Bot.</div>
    </div>

    <div class="input-area">
      <input id="input" placeholder="Ask something..." />
      <button onclick="send()">Send</button>
    </div>
  </div>
</div>

<script>
const messages = document.getElementById('messages');
const input = document.getElementById('input');

function add(text, type) {
  const msg = document.createElement('div');
  msg.className = 'message ' + type;
  msg.textContent = text;
  messages.appendChild(msg);
  messages.scrollTop = messages.scrollHeight;
}

async function send() {
  const text = input.value.trim();
  if (!text) return;

  add(text, 'user');
  input.value = '';

  const thinking = document.createElement('div');
  thinking.className = 'message bot';
  thinking.textContent = 'Thinking...';
  messages.appendChild(thinking);

  try {
    const res = await fetch('https://cornellbot.ngrok-free.dev/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: "cornellbot",
        prompt: text,
        stream: false
      })
    });

    const data = await res.json();
    thinking.remove();

    add(data.response || "No response", 'bot');

  } catch (e) {
    thinking.remove();
    add("Error connecting to your AI PC.", 'bot');
    console.error(e);
  }
}

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") send();
});
</script>

</body>
</html>
